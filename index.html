<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lake Roots Community Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Libre Franklin','Helvetica Neue',sans-serif;background:#FCFBE4;-webkit-font-smoothing:antialiased;color:#363A2E}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

.header{background:#363A2E;padding:20px 16px 14px;position:relative;overflow:hidden}
.header::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(120deg,transparent,transparent 50px,rgba(252,251,228,0.02) 50px,rgba(252,251,228,0.02) 52px)}
.header-inner{position:relative;z-index:1}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.header-sub{color:#EFDBB2;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
.header-nav{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.header-title{color:#FCFBE4;font-size:22px;font-weight:300;letter-spacing:1px}
.header-title b{font-weight:700}
.nav-btn{background:rgba(252,251,228,0.08);border:1px solid rgba(252,251,228,0.12);color:#FCFBE4;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.nav-btn:hover{background:rgba(252,251,228,0.15)}

.sub-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#363A2E;border-top:1px solid rgba(252,251,228,0.05)}
.sub-note{color:#99BAB4;font-size:9px;font-weight:500}
.sub-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:5px;background:#B68036;color:#FCFBE4;font-size:9px;font-weight:700;text-decoration:none}

.filters{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;background:#EFDBB2;border-bottom:2px solid rgba(182,128,54,0.12)}
.filter-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;transition:all 0.2s;border:2px solid;cursor:pointer}
.filter-btn .ic{font-size:8px}

.day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:#363A2E}
.day-hdr{padding:6px 3px;text-align:center;color:#99BAB4;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

.week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(239,219,178,0.3)}
.day-cell{padding:3px 3px 5px;min-height:90px;position:relative;border-right:1px solid rgba(239,219,178,0.25)}
.day-cell:last-child{border-right:none}
.day-cell.weekend{background:rgba(239,219,178,0.15)}
.day-cell.other-month{opacity:0.2;background:rgba(54,58,46,0.03)}
.day-cell.today{background:rgba(182,128,54,0.12)}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.day-num{font-size:11px;font-weight:500;line-height:1}
.day-num.today{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#B68036;color:#FCFBE4;font-weight:700}
.dots{display:flex;gap:1.5px}
.dot{width:4px;height:4px;border-radius:50%}

.events{display:flex;flex-direction:column;gap:1.5px}
.ev-pill{padding:1.5px 3px;border-radius:3px;border-left:3px solid;cursor:pointer;position:relative}
.ev-pill-text{font-size:8.5px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}

.popup{position:absolute;top:100%;margin-top:4px;background:#363A2E;color:#FCFBE4;padding:10px 14px;border-radius:10px;font-size:11px;line-height:1.5;z-index:500;min-width:200px;box-shadow:0 10px 30px rgba(54,58,46,0.5);white-space:nowrap}
.popup-title{font-weight:700;font-size:12px;margin-bottom:3px;color:#EFDBB2}
.popup-time{opacity:0.7;font-size:10px;margin-bottom:2px}
.popup-detail{opacity:0.85;margin-bottom:6px;white-space:normal}
.popup-link{display:inline-flex;align-items:center;gap:4px;color:#99BAB4;font-size:10px;font-weight:600;border-bottom:1px solid rgba(153,186,180,0.4);padding-bottom:1px;text-decoration:none}

.legend{padding:12px 16px;background:#363A2E;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-swatch{width:9px;height:9px;border-radius:2px;display:inline-block;border:1px solid rgba(252,251,228,0.12)}
.legend-label{color:#EFDBB2;font-size:9px;font-weight:500}

.footer{padding:10px 16px;text-align:center;background:#FCFBE4;border-top:1px solid rgba(239,219,178,0.3)}
.footer-text{color:rgba(54,58,46,0.5);font-size:8px;letter-spacing:0.3px;line-height:2}
.footer-text a{color:rgba(54,58,46,0.7);text-decoration:underline}

@media(max-width:680px){
  .day-cell{min-height:60px;padding:2px 2px 3px}
  .day-num{font-size:10px}
  .ev-pill{padding:1px 2px}
  .ev-pill-text{font-size:7px;max-width:52px}
  .header-title{font-size:18px}
  .header-sub{font-size:7.5px;letter-spacing:1.5px}
  .filter-btn{font-size:8px;padding:3px 7px;gap:3px}
  .nav-btn{padding:4px 8px;font-size:11px}
  .day-hdr{font-size:8px;letter-spacing:1px;padding:5px 2px}
  .popup{max-width:210px;font-size:10px;white-space:normal}
  .sub-bar{flex-direction:column;gap:6px;align-items:flex-start}
  .legend{gap:8px}
  .legend-label{font-size:8px}
}
</style>
</head>

<script>

  {d:"2026-05-01",t:"Dole: John Primer Blues",c:"dole",x:"Grammy-nom'd blues icon · hors d'oeuvres, cocktails, raffle · Benefits Senior Services",tm:"5:30 – 10 PM",u:"https://www.thedole.org/events-list/eklyffpd72ncqtgxs85006ga0kpvio"},
  {d:"2026-05-22",t:"Dole: 4th Fridays Art",c:"dole",x:"4 curated exhibits, 2 music stages, bar & snacks · $10",tm:"6 – 9 PM",u:"https://www.thedole.org/events-list"},
  {d:"2026-06-13",t:"Dole Outdoor Mkt Opens",c:"dole",x:"Weekly Saturdays through Sept · 8 AM–1 PM",tm:"8 AM – 1 PM",u:"https://www.farmersmarketatthedole.org/"},
  {d:"2026-06-26",t:"Dole: 4th Fridays Art",c:"dole",x:"4 curated exhibits, 2 music stages, bar & snacks · $10",tm:"6 – 9 PM",u:"https://www.thedole.org/events-list"},

  {d:"2026-07-24",t:"Dole: 4th Fridays Art",c:"dole",x:"4 curated exhibits, 2 music stages, bar & snacks · $10",tm:"6 – 9 PM",u:"https://www.thedole.org/events-list"},

  {d:"2026-04-03",t:"D47 No School",c:"sch",x:"Non-Attendance Day",u:"https://www.d47.org/families/calendar/school-year-calendar"},
  {d:"2026-04-22",t:"D47 Early Release",c:"sch",x:"Grades K-8 · Non-Attendance PreK",u:"https://www.d47.org/families/calendar/school-year-calendar"},
  {d:"2026-05-13",t:"D47 Early Release",c:"sch",x:"Grades K-8 · Non-Attendance PreK",u:"https://www.d47.org/families/calendar/school-year-calendar"},
  {d:"2026-05-20",t:"D47 Last Day PreK & K",c:"sch",x:"Last day for PreK & Kindergarten",u:"https://www.d47.org/families/calendar/school-year-calendar"},
  {d:"2026-05-21",t:"D47 Last Day Gr 1-8",c:"sch",x:"Last day (if no emergency days)",u:"https://www.d47.org/families/calendar/school-year-calendar"},

  // D155
  {d:"2026-04-04",t:"D155 Non-Attendance",c:"sch",x:"Day of Non-Attendance",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-04-06",t:"D155 School Resumes",c:"sch",x:"Back from Spring Break",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-04-20",t:"D155 Board Meeting",c:"sch",x:"7 PM · 1 S Virginia Rd",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-18",t:"D155 Board Meeting",c:"sch",x:"7 PM · 1 S Virginia Rd",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-19",t:"D155 Semester Exams",c:"sch",x:"Exam Day 1",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-20",t:"D155 Semester Exams",c:"sch",x:"Exam Day 2",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-05-25",t:"D155 No School",c:"sch",x:"Memorial Day",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},
  {d:"2026-06-15",t:"D155 Board Meeting",c:"sch",x:"7 PM · 1 S Virginia Rd",u:"https://www.d155.org/about/d155-upcoming-events-full-calendar"},

  // LOCAL
  {d:"2026-04-18",t:"Chamber Clean-Up Day",c:"loc",x:"CL Chamber annual community clean-up",u:"https://business.clchamber.com/events"},
  {d:"2026-04-22",t:"Social Dance Night",c:"loc",x:"Crystal Lake Park District",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-05-17",t:"Car Show + Market",c:"loc",x:"Downtown CL · 10 AM–1 PM",u:"https://downtowncl.org/annual-events/"},
  {d:"2026-05-19",t:"Social Dance Night",c:"loc",x:"Crystal Lake Park District",u:"https://www.crystallakeparks.org/special-events"},
  {d:"2026-06-01",t:"Chamber Golf Outing",c:"loc",x:"CL Chamber of Commerce",u:"https://business.clchamber.com/events"},
  {d:"2026-06-20",t:"Midsummer Wine Walk",c:"loc",x:"Downtown Crystal Lake",u:"https://downtowncl.org/wine-walk/"},
  {d:"2026-07-05",t:"Independence Parade",c:"loc",x:"Downtown Crystal Lake",u:"https://business.clchamber.com/events"}
];

var C = {
  hol:  {l:"Holidays",           cl:"#B68036", bg:"rgba(182,128,54,0.10)",  ic:"✦"},
  lr:   {l:"Lake Roots",         cl:"#363A2E", bg:"rgba(54,58,46,0.10)",    ic:"⛵"},
  dole: {l:"The Dole",           cl:"#8B6F52", bg:"rgba(139,111,82,0.10)",  ic:"🏛"},
  sch:  {l:"School (D47/155)",   cl:"#5B7A6F", bg:"rgba(91,122,111,0.10)",  ic:"◆"},
  loc:  {l:"Local Events",       cl:"#7EA9A1", bg:"rgba(126,169,161,0.12)", ic:"●"}
};

var MN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var DN = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// State
var state = {
  filters: {hol:true, lr:true, dole:true, sch:true, loc:true},
  offset: 0,
  openPopup: null
};

function fk(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function getWeeks(y, m) {
  var first = new Date(y, m, 1);
  var last = new Date(y, m+1, 0);
  var weeks = [];
  var c = new Date(first);
  c.setDate(c.getDate() - c.getDay());
  while (c <= last || c.getDay() !== 0) {
    var wk = [];
    for (var i=0; i<7; i++) {
      wk.push(new Date(c));
      c.setDate(c.getDate()+1);
    }
    weeks.push(wk);
    if (c > last && c.getDay() === 0) break;
  }
  return weeks;
}

function getCurrentMonth() {
  var m = 3 + state.offset;
  var y = 2026;
  while (m > 11) { m -= 12; y++; }
  while (m < 0) { m += 12; y--; }
  return {m:m, y:y};
}

function renderFilters() {
  var container = document.getElementById("filters");
  container.innerHTML = "";
  Object.keys(C).forEach(function(k){
    var v = C[k];
    var on = state.filters[k];
    var btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.style.borderColor = v.cl;
    btn.style.background = on ? v.cl : "transparent";
    btn.style.color = on ? "#FCFBE4" : v.cl;
    btn.style.opacity = on ? "1" : "0.45";
    btn.innerHTML = '<span class="ic">' + v.ic + '</span>' + v.l;
    btn.addEventListener("click", function(){
      state.filters[k] = !state.filters[k];
      renderFilters();
      renderGrid();
    });
    container.appendChild(btn);
  });
}

function renderDayHeaders() {
  var container = document.getElementById("dayHeaders");
  container.innerHTML = "";
  DN.forEach(function(d){
    var div = document.createElement("div");
    div.className = "day-hdr";
    div.textContent = d;
    container.appendChild(div);
  });
}

function renderHeader() {
  var cm = getCurrentMonth();
  document.getElementById("monthLabel").innerHTML = MN[cm.m] + " <b>" + cm.y + "</b>";
}

function getEventMap() {
  var map = {};
  EV.forEach(function(e){
    if (!state.filters[e.c]) return;
    if (!map[e.d]) map[e.d] = [];
    map[e.d].push(e);
  });
  return map;
}

function renderGrid() {
  renderHeader();
  var cm = getCurrentMonth();
  var weeks = getWeeks(cm.y, cm.m);
  var evMap = getEventMap();
  var todayKey = fk(new Date());

  var container = document.getElementById("calGrid");
  container.innerHTML = "";

  weeks.forEach(function(wk){
    var weekDiv = document.createElement("div");
    weekDiv.className = "week";
    wk.forEach(function(day, di){
      var key = fk(day);
      var isCur = day.getMonth() === cm.m;
      var isToday = key === todayKey;
      var isWe = di === 0 || di === 6;
      var evs = evMap[key] || [];

      var cell = document.createElement("div");
      cell.className = "day-cell";
      if (isToday) cell.classList.add("today");
      else if (isWe && isCur) cell.classList.add("weekend");
      if (!isCur) cell.classList.add("other-month");

      // Top row
      var top = document.createElement("div");
      top.className = "day-top";
      var num = document.createElement("span");
      num.className = "day-num" + (isToday ? " today" : "");
      num.textContent = day.getDate();
      top.appendChild(num);

      if (evs.length > 0) {
        var dots = document.createElement("div");
        dots.className = "dots";
        var seen = {};
        evs.forEach(function(ev){
          if (seen[ev.c]) return;
          seen[ev.c] = true;
          var dot = document.createElement("span");
          dot.className = "dot";
          dot.style.background = C[ev.c].cl;
          dots.appendChild(dot);
        });
        top.appendChild(dots);
      }
      cell.appendChild(top);

      // Events
      var evsDiv = document.createElement("div");
      evsDiv.className = "events";
      evs.forEach(function(ev, ei){
        var id = key + "-" + ei;
        var pill = document.createElement("div");
        pill.className = "ev-pill";
        pill.style.background = C[ev.c].bg;
        pill.style.borderLeftColor = C[ev.c].cl;

        var txt = document.createElement("div");
        txt.className = "ev-pill-text";
        txt.style.color = C[ev.c].cl;
        txt.textContent = ev.t;
        pill.appendChild(txt);

        pill.addEventListener("click", function(e){
          e.stopPropagation();
          if (state.openPopup === id) {
            state.openPopup = null;
          } else {
            state.openPopup = id;
          }
          renderGrid();
        });

        if (state.openPopup === id) {
          var pop = document.createElement("div");
          pop.className = "popup";
          if (di > 4) { pop.style.right = "0"; } else { pop.style.left = "0"; }

          var ptitle = document.createElement("div");
          ptitle.className = "popup-title";
          ptitle.textContent = ev.t;
          pop.appendChild(ptitle);

          if (ev.tm) {
            var ptime = document.createElement("div");
            ptime.className = "popup-time";
            ptime.textContent = "🕐 " + ev.tm;
            pop.appendChild(ptime);
          }

          if (ev.x) {
            var pdet = document.createElement("div");
            pdet.className = "popup-detail";
            pdet.textContent = ev.x;
            pop.appendChild(pdet);
          }

          if (ev.u) {
            var plink = document.createElement("a");
            plink.className = "popup-link";
            plink.href = ev.u;
            plink.target = "_blank";
            plink.rel = "noopener";
            plink.textContent = "View source →";
            plink.addEventListener("click", function(e){ e.stopPropagation(); });
            pop.appendChild(plink);
          }

          pill.appendChild(pop);
        }

        evsDiv.appendChild(pill);
      });
      cell.appendChild(evsDiv);
      weekDiv.appendChild(cell);
    });
    container.appendChild(weekDiv);
  });
}

function renderLegend() {
  var container = document.getElementById("legend");
  container.innerHTML = "";
  Object.keys(C).forEach(function(k){
    var v = C[k];
    var item = document.createElement("div");
    item.className = "legend-item";
    var swatch = document.createElement("span");
    swatch.className = "legend-swatch";
    swatch.style.background = v.cl;
    var label = document.createElement("span");
    label.className = "legend-label";
    label.textContent = v.l;
    item.appendChild(swatch);
    item.appendChild(label);
    container.appendChild(item);
  });
}

// Event listeners
document.getElementById("prevBtn").addEventListener("click", function(){
  state.offset--;
  state.openPopup = null;
  renderGrid();
});
document.getElementById("nextBtn").addEventListener("click", function(){
  state.offset++;
  state.openPopup = null;
  renderGrid();
});
