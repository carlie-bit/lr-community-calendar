.legend{padding:12px 16px;background:#363A2E;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center}
.li{display:flex;align-items:center;gap:5px}
.ls{width:9px;height:9px;border-radius:2px;display:inline-block;border:1px solid rgba(252,251,228,0.12)}
.ll{color:#EFDBB2;font-size:9px;font-weight:500}

  .legend{gap:8px!important}.ll{font-size:8px!important}
