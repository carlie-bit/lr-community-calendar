*{margin:0;padding:0;box-sizing:border-box}

button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
.header{background:#363A2E;padding:20px 16px 14px;position:relative;overflow:hidden}
.header::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(120deg,transparent,transparent 50px,rgba(252,251,228,0.02) 50px,rgba(252,251,228,0.02) 52px)}

.header-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.header-sub{color:#EFDBB2;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600}
.header-nav{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.header-title{color:#FCFBE4;font-size:22px;font-weight:300;letter-spacing:1px}
.header-title b{font-weight:700}
.nav-btn{background:rgba(252,251,228,0.08);border:1px solid rgba(252,251,228,0.12)!important;color:#FCFBE4;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600}
.sub-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#363A2E;border-top:1px solid rgba(252,251,228,0.05)}
.sub-note{color:#99BAB4;font-size:9px;font-weight:500}
.sub-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:5px;background:#B68036;color:#FCFBE4;font-size:9px;font-weight:700;text-decoration:none}
.filters{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;background:#EFDBB2;border-bottom:2px solid rgba(182,128,54,0.12)}
.fbtn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:14px;font-size:9px;font-weight:600;transition:all 0.2s;cursor:pointer}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);background:#363A2E}
.day-hdr{padding:6px 3px;text-align:center;color:#99BAB4;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(239,219,178,0.3)}
.dc{padding:3px 3px 5px;min-height:90px;position:relative;border-right:1px solid rgba(239,219,178,0.25)}
.dc:last-child{border-right:none}
.dc.we{background:rgba(239,219,178,0.15)}.dc.om{opacity:0.2}.dc.td{background:rgba(182,128,54,0.12)}
.dt{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.dn{font-size:11px;font-weight:500}.dn.td{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#B68036;color:#FCFBE4;font-weight:700}
.dots{display:flex;gap:1.5px}.dot{width:4px;height:4px;border-radius:50%}
.evs{display:flex;flex-direction:column;gap:1.5px}
.ep{padding:1.5px 3px;border-radius:3px;border-left:3px solid;cursor:pointer;position:relative}
.ept{font-size:8.5px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.pop{position:absolute;top:100%;margin-top:4px;background:#363A2E;color:#FCFBE4;padding:10px 14px;border-radius:10px;font-size:11px;line-height:1.5;z-index:500;min-width:200px;box-shadow:0 10px 30px rgba(54,58,46,0.5);white-space:nowrap}
.pop-t{font-weight:700;font-size:12px;margin-bottom:3px;color:#EFDBB2}
.pop-tm{opacity:0.7;font-size:10px;margin-bottom:2px}
.pop-x{opacity:0.85;margin-bottom:6px;white-space:normal}
.pop-l{display:inline-flex;align-items:center;gap:4px;color:#99BAB4;font-size:10px;font-weight:600;border-bottom:1px solid rgba(153,186,180,0.4);padding-bottom:1px;text-decoration:none}
.gcal-section{background:#363A2E;border-top:2px solid #B68036}
.gcal-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer}
.gcal-toggle:hover{background:rgba(252,251,228,0.03)}
.gcal-label{color:#EFDBB2;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.gcal-arrow{color:#99BAB4;font-size:14px;transition:transform 0.3s}
.gcal-arrow.open{transform:rotate(180deg)}
.gcal-body{overflow:hidden;max-height:0;transition:max-height 0.4s ease}
.gcal-body.open{max-height:600px}
.legend{padding:10px 12px;background:#363A2E;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
.li{display:flex;align-items:center;gap:4px}
.ls{width:8px;height:8px;border-radius:2px;display:inline-block;border:1px solid rgba(252,251,228,0.12)}
.ll{color:#EFDBB2;font-size:8px;font-weight:500}
.footer{padding:10px 16px;text-align:center;background:#FCFBE4;border-top:1px solid rgba(239,219,178,0.3)}
.ft{color:rgba(54,58,46,0.5);font-size:8px;letter-spacing:0.3px;line-height:2}
.ft a{color:rgba(54,58,46,0.7);text-decoration:underline}
@media(max-width:680px){
  .dc{min-height:55px!important;padding:2px 2px 3px!important}.dn{font-size:10px!important}

  .day-hdr{font-size:7px!important;padding:5px 1px!important}
  .pop{max-width:200px!important;font-size:9px!important;white-space:normal!important}
  .sub-bar{flex-direction:column!important;gap:6px!important;align-items:flex-start!important}
}
</style>
